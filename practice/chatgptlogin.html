<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
    margin: 0;
    font-family: sans-serif;
}

/* Main layout */
.container{
    display: flex;
    height: 100vh;
}

/* LEFT SIDE */
.left{
    flex: 1.5;
    background: linear-gradient(135deg, #3a3a9f, #6c63ff);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 50px;
}

.left h1{
    font-size: 40px;
    margin-bottom: 20px;
}

.left p{
    font-size: 18px;
    line-height: 1.6;
}

/* RIGHT SIDE */
.right{
    flex: 1.5;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FORM */
.login-form{
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.login-form input{
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.login-form button{
    padding: 12px;
    background-color: #3a3a9f;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.login-form button:hover{
    background-color: #2c2c7a;
}

.footer{
    font-size: 14px;
    text-align: center;
}
</style>
<body>
    <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>Welcome back, Mohan 👋</h1>
        <p>
            Log in to continue building your projects, manage your data,
            and improve your skills every day. Stay consistent and keep growing 🚀
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <form class="login-form">
            <h2>Login</h2>

            <input type="email" placeholder="Enter your email" required>
            <input type="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>

            <p class="footer">
                Don’t have an account? <a href="#">Sign up</a>
            </p>
        </form>
    </div>

</div>
</body>
</html>
