<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>
<style>
    body button{
        margin-right: 10px;
        margin-left: 10px;
        padding: 5px 40px;
    }
    #display{
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }
</style>
<body>
    
    <h1 id="name">Bat Ball Stump Game</h1>
    <button id="btn1" onclick="
        computer_choice = Computer();
        result = Result('Bat',computer_choice)
        display.innerHTML = `Your move: Bat ~ Computer move: ${computer_choice} <br> ${result}`;
   
    " >Bat</button><button id="btn2" onclick="
        computer_choice = Computer();
        result = Result('Ball',computer_choice)
        display.innerHTML = `Your move: Ball ~ Computer move: ${computer_choice} <br> ${result}`;
    " >Ball</button><button id="btn3" onclick="
        computer_choice = Computer();
        result = Result('Stump',computer_choice) 
        display.innerHTML = `Your move: Stump ~ Computer move: ${computer_choice} <br> ${result}`;  
    " >Stump</button>
    <h1 id="display">  </h1>
</body>
   
<script>
    
    let display = document.querySelector("#display")
    let computer_choice;
    let result;
    
    function Computer(){
        let number = Math.floor(Math.random()*10);
          if ( number >= 0 && number <3){
                return `Bat`;
            }
            else if ( number >=3 && number <6) {
                return `Ball`;
            } 
            else if( number>=6 && number < 10){
                return `Stump`;
            }
            else{
                 return
            }      
    }
    
    

    function Result(my_choice,computer_move){
        if(my_choice === 'Bat'){
            if(computer_move === `Bat`){
                return `Draw`;
            }
            else if(computer_move === `Ball`){
                return `You Won`;
            }
            else{
                return `You Loss`;
            }
            
        }
        else if(my_choice === 'Ball'){
            if(computer_move === `Bat`){
                return `You Loss`;
            }
            else if(computer_move === `Ball`){
                return `Draw`;
            }
            else{
                return `You Won`;
            }
        } 
        else{
            if(computer_move === `Bat`){
                return `You Won`;
            }
            else if(computer_move === `Ball`){
                return `You Loss`;
            }
            else{
                return `Draw`;
            }
        }
    }

    
</script>
</html>
