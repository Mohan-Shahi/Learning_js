<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="container-1">
            <input type="text" id="display" readonly>
        </div>
        <div id="container-2">
            
            
            <button onclick=" 
                   current_value = '';
                   document.querySelector(`#display`).value = `${current_value}`; 
                   ">C</button>
            <button onclick="
                    current_value = current_value + '1';
                    document.querySelector(`#display`).value = `${current_value }`; 
                    " >1</button>
            <button onclick="
            current_value = current_value + '2';
                    document.querySelector(`#display`).value = `${current_value }`;
            ">2</button>
          
            <button onclick="
            current_value = current_value + '+';
                    document.querySelector(`#display`).value = `${current_value }`;
            ">+</button>
            <button onclick="
            current_value = current_value + '3';
                    document.querySelector(`#display`).value = `${current_value }`;
            ">3</button>
            <button onclick="
            current_value = current_value + '4';
                    document.querySelector(`#display`).value = `${current_value }`;
            ">4</button>
            
            

            
                <button onclick="
                current_value = current_value + '-';
                    document.querySelector(`#display`).value = `${current_value }`;
                ">-</button>
                <button onclick="
                current_value = current_value + '5';
                    document.querySelector(`#display`).value = `${current_value }`;
                ">5</button>
                <button onclick="
                current_value = current_value + '6';
                    document.querySelector(`#display`).value = `${current_value }`;
                ">6</button>
            
                <button onclick="
                current_value = current_value + '*';
                    document.querySelector(`#display`).value = `${current_value }`;
                ">*</button>
                <button onclick="
                current_value = current_value + '7';
                    document.querySelector(`#display`).value = `${current_value }`;
                ">7</button>
                <button onclick="
                current_value = current_value + '8';
                    document.querySelector(`#display`).value = `${current_value }`;
                ">8</button>
            
                <button onclick="
                current_value = current_value + '/';
                    document.querySelector(`#display`).value = `${current_value }`;
                ">/</button>
                <button onclick="
                    
                    current_value = eval(current_value);
                    document.querySelector(`#display`).value = `${current_value }`;
                    current_value = ``;

                ">=</button>
                <button onclick="
                    current_value = current_value + '9';
                    document.querySelector(`#display`).value = `${current_value }`;
                ">9</button>
           
       
            <button onclick="
                    current_value = current_value + '0';
                    document.querySelector(`#display`).value = `${current_value }`;
            ">0</button>
            <button onclick="
            current_value = current_value + '.';
                    document.querySelector(`#display`).value = `${current_value }`;
            ">.</button>
       
    </div>
</div>
</body>

<script src="script.js"></script>
</html>
